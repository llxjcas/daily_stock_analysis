name: 币安美股合约监控

on:
  schedule:
    # 北京时间每天 08:00, 14:00, 20:00 (UTC 0:00, 6:00, 12:00)
    - cron: '0 0,6,12 * * 1-5'
  workflow_dispatch:

concurrency:
  group: binance-perp-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install ccxt requests

      - name: 抓取币安美股合约数据
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/fetch_binance_perps.py
          python scripts/push_perp_report.py
